name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Get Obsidian cache key
        run: |
          npx tsx wdio.conf.mts | grep 'obsidian-cache-key:' > obsidian-versions-lock.txt
          rm -rf .obsidian-cache
        env:
          CI: true

      - name: Cache Obsidian
        uses: actions/cache@v4
        with:
          path: .obsidian-cache
          key: obsidian-cache-${{ hashFiles('obsidian-versions-lock.txt') }}

      - name: Setup virtual display
        run: |
          sudo rm -rf /etc/apt/sources.list.d/*.list
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update -q
          sudo apt-get install -q herbstluftwm x11-xserver-utils
          export DISPLAY=:99
          echo "DISPLAY=$DISPLAY" >> "$GITHUB_ENV"
          Xvfb $DISPLAY -screen 0 1280x1024x24 +extension GLX -noreset &
          sleep 1
          herbstluftwm &
          sleep 1

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          WDIO_MAX_INSTANCES: 2
